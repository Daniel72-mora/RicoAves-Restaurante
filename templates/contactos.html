<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Maricela herandez">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contactos</title>
    <link rel="stylesheet" href="./contactos.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='contactos.css') }}">
</head>
<body>
    <section class="tarjeta">
    <h2>Contactos</h2>
    <form action="/" method="POST">
        <fieldset>
            <label for="nombre">Nombre completo:</label>
            <input type="text" name="nombre" placeholder="Ingrese nombre completo:" required> <br><br>
            
            <label for="direccion">Dirección de entrega:</label>
            <input type="text" name="direccion" placeholder="Ej: Carrera 10 # 5-20" required> <br><br>

            <label for="email">Correo electrónico:</label>
            <input type="email" name="email" placeholder="Ingrese correo electrónico:" required> <br><br>
            
            <label for="telefono">Número de teléfono:</label>
            <input type="tel" name="telefono" placeholder="Ingrese número de teléfono" required> <br><br>
            
            <label for="mensaje">Mensaje</label>
            <textarea name="mensaje" placeholder="Escribe tu mensaje" rows="4"></textarea> <br><br>
            
            <input type="submit" value="Enviar">
        </fieldset>
    </form>
</section>
</body>
</html>
